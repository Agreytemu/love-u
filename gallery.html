<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totoo's Vault | Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff416c; --bg: #030303; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .special-font { font-family: 'Dancing Script', cursive; }
        .luxury-font { font-family: 'Playfair Display', serif; font-style: italic; }
        
        /* MASONRY PRO LAYOUT */
        .media-container { 
            column-count: 2; column-gap: 16px; padding: 15px;
            animation: fadeIn 1s ease-in;
        }
        @media (min-width: 768px) { .media-container { column-count: 4; column-gap: 25px; } }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .media-item {
            break-inside: avoid; margin-bottom: 20px; border-radius: 24px;
            overflow: hidden; border: 1px solid rgba(255, 65, 108, 0.15);
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(5px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .media-item:hover {
            transform: scale(1.04) rotate(1deg);
            border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(255, 65, 108, 0.2);
            z-index: 10;
        }

        .media-item img, .media-item video { width: 100%; height: auto; display: block; transition: 0.5s; }
        .media-item:hover img { filter: brightness(1.1); }

        /* CAPTION YA KISHUA */
        .caption-box {
            padding: 15px 10px;
            background: linear-gradient(to top, rgba(255, 65, 108, 0.1), transparent);
            font-size: 13px; font-weight: 300; color: #ffccd5;
            text-align: center; letter-spacing: 0.5px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* FLOATING NAVIGATION */
        .glass-nav {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px; margin: 15px auto; width: fit-content;
        }

        /* SEARCH MASTER */
        .search-container { position: relative; max-width: 320px; margin: 30px auto; }
        .search-input {
            width: 100%; padding: 12px 25px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 65, 108, 0.3);
            color: white; font-size: 12px; transition: 0.4s; text-align: center;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(255, 65, 108, 0.2); outline: none; background: rgba(255, 255, 255, 0.07); }

        /* LOADER ANIMATION */
        .heart-loader { color: var(--accent); font-size: 40px; animation: heartBeat 1.2s infinite; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        audio { filter: invert(1) hue-rotate(180deg); width: 90%; height: 35px; margin: 15px auto; display: block; opacity: 0.7; }
        video::-webkit-media-controls-panel { background-image: linear-gradient(transparent, rgba(0,0,0,0.8)) !important; }
    </style>
</head>

        </div>
    </nav>

        </h1>
        <p class="text-[9px] uppercase tracking-[0.6em] text-white/30 font-light">Elegance meets memories</p>

<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totoo's Vault | The Luxury Gallery</title>
    <link rel="icon" type="image/jpeg" sizes="32x32" href="OIP.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="OIP.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .special-font { font-family: 'Dancing Script', cursive; }
        .luxury-font { font-family: 'Playfair Display', serif; }
        
        /* MASONRY LAYOUT */
        #media-grid { column-count: 2; column-gap: 15px; padding: 15px; display: none; }
        @media (min-width: 768px) { #media-grid { column-count: 4; column-gap: 25px; } }

        .media-item {
            break-inside: avoid; margin-bottom: 25px; border-radius: 24px;
            overflow: hidden; border: 1px solid rgba(255, 65, 108, 0.1);
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .media-item:hover { transform: scale(1.03); border-color: #ff416c; z-index: 10; }
        .media-item img, .media-item video { width: 100%; display: block; border-radius: 24px 24px 0 0; }

        .caption-box { 
            padding: 15px; text-align: center; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .caption-text { font-size: 11px; color: #ffccd5; text-transform: uppercase; letter-spacing: 2px; font-weight: 300; }

        /* LOADER HEART */
        .heart-loader { color: #ff416c; font-size: 50px; animation: heartBeat 1.2s infinite; text-align: center; margin-top: 100px; }
        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed top-6 left-0 w-full z-50 flex justify-center px-4">
        <div class="bg-black/40 backdrop-blur-xl border border-white/10 px-8 py-3 rounded-full flex gap-10 items-center shadow-2xl">
            <a href="love.html" class="special-font text-3xl text-pink-500 hover:scale-110 transition">❤️</a>
            <div class="h-4 w-[1px] bg-white/20"></div>
            <a href="admin.html" class="text-[9px] font-bold tracking-[0.5em] text-white/40 hover:text-pink-500 transition uppercase">Admin Panel</a>
        </div>
    </nav>

    <header class="text-center pt-40 mb-12 px-6">
        <h1 class="luxury-font text-6xl md:text-8xl mb-4 bg-clip-text text-transparent bg-gradient-to-r from-white via-pink-300 to-pink-600 italic">
            Mawingu ya Siri
        </h1>
        <p class="text-[10px] uppercase tracking-[0.8em] text-white/20 font-light">The Sacred Vault of Memories</p>
    </header>

    <div id="loader" class="py-24 text-center">
        <div class="heart-loader">❤️</div>
        <p class="text-[10px] tracking-[0.5em] text-pink-300 mt-6 uppercase animate-pulse">Inafungua Vault ya Totoo...</p>
    </div>

    <div id="media-grid" class="media-grid"></div>

    <script>
        // DATA ZAKO ULIZONIPA
        const CLOUD_NAME = 'dutntrdi3';

        async function fetchGallery() {
            try {
                // Cloudinary inaruhusu kuvuta list ya picha kwa kutumia TAG (tulizoweka kule Admin 'vault')
                // KUMBUKA: Inabidi uingie Cloudinary Settings -> Security -> na u-uncheck "Restrict image fetching" kama kodi hii itagoma kuvuta.
                const response = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/vault.json`);
                
                if (!response.ok) {
                    throw new Error("Picha hazijapatikana. Hakikisha umeruhusu 'Public Resource Listing' kule Cloudinary.");
                }

                const data = await response.json();
                renderGallery(data.resources);
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = `
                    <p class="text-white/30 text-[10px] tracking-widest uppercase px-10">
                        Vault ipo tupu au list imefungwa.<br>
                        <span class="text-pink-500">Hakikisha umerusha angalau picha moja kule Admin!</span>
                    </p>`;
            }
        }

        function renderGallery(items) {
            const grid = document.getElementById('media-grid');
            const loader = document.getElementById('loader');
            grid.innerHTML = '';

            items.forEach(img => {
                const div = document.createElement('div');
                div.className = 'media-item';
                
                // Tunatengeneza URL ya picha
                const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto/v${img.version}/${img.public_id}.${img.format}`;
                
                // Kuchukua Description (context caption)
                // Cloudinary JSON inatupa caption kama ipo
                const description = img.context && img.context.custom ? img.context.custom.caption : "Memories";

                div.innerHTML = `
                    <img src="${url}" alt="Memory" loading="lazy">
                    <div class="caption-box">
                        <p class="caption-text">${description}</p>
                    </div>
                `;
                grid.appendChild(div);
            });

            loader.style.display = 'none';
            grid.style.display = 'block';
        }

        // Kuanza kazi
        window.onload = fetchGallery;
    </script>
</body>
</html>

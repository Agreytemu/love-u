<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totoo's Vault | Powered by Agrey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .special-font { font-family: 'Dancing Script', cursive; }
        
        .media-container { column-count: 1; column-gap: 15px; }
        @media (min-width: 768px) { .media-container { column-count: 3; } }

        .media-item {
            break-inside: avoid;
            margin-bottom: 15px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .media-item:hover { transform: scale(1.03); border-color: #ff416c; box-shadow: 0 10px 30px rgba(255, 65, 108, 0.3); }

        audio { filter: invert(100%) hue-rotate(180deg) brightness(1.5); width: 100%; height: 35px; }
        
        .loading-shimmer {
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Navigation Style */
        .admin-nav {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="fixed top-0 left-0 w-full z-50 admin-nav px-6 py-3 flex justify-between items-center">
        <a href="love.html" class="text-xs font-bold text-gray-400 hover:text-white uppercase tracking-tighter">← Home</a>
        <a href="admin.html" class="bg-pink-600 hover:bg-pink-700 text-white px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-lg shadow-pink-500/20">
            ADMIN PANEL
        </a>
    </nav>

    <header class="text-center mb-16 pt-20">
        <h1 class="special-font text-6xl text-pink-500 mb-2">Maktaba ya Siri</h1>
        <p class="text-gray-400 uppercase tracking-widest text-[10px] md:text-xs">Kila kitu unachokipenda, kiko hapa - Kwa ajili ya Totoo</p>
        <div class="h-1 w-20 bg-pink-600 mx-auto mt-4 rounded-full"></div>
    </header>

    <div id="gallery-loader" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="h-64 loading-shimmer rounded-3xl"></div>
        <div class="h-64 loading-shimmer rounded-3xl"></div>
        <div class="h-64 loading-shimmer rounded-3xl"></div>
    </div>

    <div id="media-grid" class="media-container hidden"></div>

    <footer class="mt-20 text-center text-gray-600 text-[10px] uppercase tracking-[0.3em]">
        Mali ya Agrey & Totoo | © 2024 - 2026
    </footer>

    <script>
        const SUPABASE_URL = 'https://rcfocaatkscgassogibs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjZm9jYWF0a3NjZ2Fzc29naWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjgzNDYsImV4cCI6MjA4ODM0NDM0Nn0.XgyTtSXBRQbbiQLuo4SThVVM6dM5uvUQUl-u_J889U4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchMedia() {
            const { data, error } = await supabase.storage.from('media').list('', {
                limit: 100,
                offset: 0,
                sortBy: { column: 'created_at', order: 'desc' }, // Mpya zaidi ianze
            });

            if (error) {
                console.error('Error fetching media:', error);
                return;
            }

            const grid = document.getElementById('media-grid');
            const loader = document.getElementById('gallery-loader');

            data.forEach(file => {
                const { data: publicUrlData } = supabase.storage.from('media').getPublicUrl(file.name);
                const url = publicUrlData.publicUrl;
                const ext = file.name.split('.').pop().toLowerCase();
                
                let htmlContent = '';

                if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                    htmlContent = `<img src="${url}" class="w-full h-auto block" loading="lazy">`;
                } else if (['mp4', 'webm', 'ogg', 'mov'].includes(ext)) {
                    htmlContent = `<video controls class="w-full h-auto"><source src="${url}" type="video/${ext}"></video>`;
                } else if (['mp3', 'wav', 'm4a', 'ogg'].includes(ext)) {
                    htmlContent = `
                        <div class="p-6 text-center">
                            <p class="text-[10px] mb-3 text-pink-400 font-bold uppercase tracking-widest">Voice Note 🎙️</p>
                            <audio controls class="rounded-lg"><source src="${url}" type="audio/${ext}"></audio>
                        </div>`;
                }

                if (htmlContent) {
                    const div = document.createElement('div');
                    div.className = 'media-item shadow-2xl';
                    div.innerHTML = htmlContent;
                    grid.appendChild(div);
                }
            });

            loader.classList.add('hidden');
            grid.classList.remove('hidden');
        }

        fetchMedia();
    </script>
</body>
</html>

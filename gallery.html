<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totoo's Vault | Master Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff416c; --bg: #030303; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .special-font { font-family: 'Dancing Script', cursive; }
        .luxury-font { font-family: 'Playfair Display', serif; font-style: italic; }
        
        .media-container { column-count: 2; column-gap: 16px; padding: 15px; display: none; }
        @media (min-width: 768px) { .media-container { column-count: 4; column-gap: 25px; } }

        .media-item {
            break-inside: avoid; margin-bottom: 20px; border-radius: 24px;
            overflow: hidden; border: 1px solid rgba(255, 65, 108, 0.15);
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .media-item:hover { transform: scale(1.04); border-color: var(--accent); z-index: 10; }
        .media-item img, .media-item video { width: 100%; display: block; }

        .search-input {
            width: 100%; max-width: 350px; padding: 14px 25px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 65, 108, 0.3);
            color: white; font-size: 13px; text-align: center; outline: none;
        }

        .heart-loader { color: var(--accent); font-size: 50px; animation: heartBeat 1.2s infinite; text-align: center; }
        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        
        audio { filter: invert(1); width: 100%; height: 35px; margin-top: 10px; }
        .caption { font-size: 10px; color: #ffccd5; text-align: center; padding: 10px; text-transform: uppercase; }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed top-5 left-0 w-full z-50 flex justify-center px-4">
        <div class="bg-black/60 backdrop-blur-2xl border border-white/10 px-8 py-3 rounded-full flex gap-10 items-center">
            <a href="love.html" class="special-font text-3xl text-pink-500">❤️</a>
            <div class="h-5 w-[1px] bg-white/20"></div>
            <a href="admin.html" class="text-[10px] font-bold tracking-[0.4em] text-white/40 hover:text-pink-500 transition">ADMIN</a>
        </div>
    </nav>

    <header class="text-center pt-40 mb-12 px-6">
        <h1 class="luxury-font text-6xl md:text-8xl mb-6 bg-clip-text text-transparent bg-gradient-to-r from-white via-pink-400 to-pink-600">
            Maktaba ya Siri
        </h1>
        <div class="flex justify-center mt-10">
            <input type="text" id="searchInput" onkeyup="filterMedia()" placeholder="TAFUTA KWA JINA..." class="search-input">
        </div>
    </header>

    <div id="loader" class="py-24 text-center">
        <div class="heart-loader">❤️</div>
        <p class="text-[11px] tracking-[0.5em] text-pink-300 mt-6 uppercase">Inavuta picha moja kwa moja...</p>
    </div>

    <div id="media-grid" class="media-container"></div>

    <script>
        const SUPABASE_URL = 'https://rcfocaatkscgassogibs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjZm9jYWF0a3NjZ2Fzc29naWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjgzNDYsImV4cCI6MjA4ODM0NDM0Nn0.XgyTtSXBRQbbiQLuo4SThVVM6dM5uvUQUl-u_J889U4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allFiles = [];

        async function fetchMediaDirectly() {
            // HAPA TUNASOMA STORAGE MOJA KWA MOJA!
            const { data, error } = await supabase.storage.from('media').list('', {
                limit: 100,
                sortBy: { column: 'created_at', order: 'desc' }
            });

            if (error) {
                console.error("Error:", error);
                document.getElementById('loader').innerText = "Inagoma kuvuta Storage...";
                return;
            }

            allFiles = data;
            renderGallery(allFiles);
        }

        function renderGallery(files) {
            const grid = document.getElementById('media-grid');
            const loader = document.getElementById('loader');
            grid.innerHTML = '';

            files.forEach(file => {
                const { data: urlData } = supabase.storage.from('media').getPublicUrl(file.name);
                const url = urlData.publicUrl;
                const ext = file.name.split('.').pop().toLowerCase();
                
                let content = '';
                if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                    content = `<img src="${url}" loading="lazy">`;
                } else if (['mp4', 'webm', 'mov'].includes(ext)) {
                    content = `<video controls loop muted><source src="${url}" type="video/${ext}"></video>`;
                } else if (['mp3', 'm4a', 'wav'].includes(ext)) {
                    content = `<div class="p-4 text-center"><p class="text-[9px] text-pink-400">VOICE NOTE</p><audio controls><source src="${url}" type="audio/${ext}"></audio></div>`;
                }

                if (content) {
                    const div = document.createElement('div');
                    div.className = 'media-item shadow-2xl';
                    div.innerHTML = `${content}<div class="caption">${file.name.substring(0, 15)}...</div>`;
                    grid.appendChild(div);
                }
            });

            loader.style.display = 'none';
            grid.style.display = 'block';
        }

        function filterMedia() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allFiles.filter(f => f.name.toLowerCase().includes(val));
            renderGallery(filtered);
        }

        fetchMediaDirectly();
    </script>
</body>
</html>

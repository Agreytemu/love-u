<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totoo's Vault | Powered by Agrey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .special-font { font-family: 'Dancing Script', cursive; }
        
        .media-container { column-count: 1; column-gap: 15px; }
        @media (min-width: 768px) { .media-container { column-count: 3; } }

        .media-item {
            break-inside: avoid;
            margin-bottom: 15px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .media-item:hover { transform: scale(1.03); border-color: #ff416c; box-shadow: 0 10px 30px rgba(255, 65, 108, 0.3); }

        .caption-box {
            padding: 12px;
            background: rgba(255, 65, 108, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
            color: #ccc;
            line-height: 1.4;
        }

        audio { filter: invert(100%) hue-rotate(180deg) brightness(1.5); width: 100%; height: 35px; }
        
        .loading-shimmer {
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .admin-nav {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .search-input:focus {
            border-color: #ff416c;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.2);
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="fixed top-0 left-0 w-full z-50 admin-nav px-6 py-3 flex justify-between items-center">
        <a href="love.html" class="text-xs font-bold text-gray-400 hover:text-white uppercase tracking-tighter">← Home</a>
        <a href="admin.html" class="bg-pink-600 hover:bg-pink-700 text-white px-4 py-1.5 rounded-full text-[10px] font-bold transition-all shadow-lg shadow-pink-500/20">
            ADMIN PANEL
        </a>
    </nav>

    <header class="text-center mb-10 pt-20">
        <h1 class="special-font text-6xl text-pink-500 mb-2">Maktaba ya Siri</h1>
        <p class="text-gray-400 uppercase tracking-widest text-[10px]">Kila kitu unachokipenda kiko hapa</p>
        
        <div class="max-w-md mx-auto mt-8 px-4">
            <input type="text" id="searchInput" onkeyup="filterMedia()" placeholder="Tafuta picha, video au sauti..." 
                class="search-input w-full py-3 px-6 rounded-full text-sm outline-none text-center">
        </div>
    </header>

    <div id="gallery-loader" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="h-64 loading-shimmer rounded-3xl"></div>
        <div class="h-64 loading-shimmer rounded-3xl"></div>
        <div class="h-64 loading-shimmer rounded-3xl"></div>
    </div>

    <div id="media-grid" class="media-container hidden"></div>

    <footer class="mt-20 text-center text-gray-600 text-[10px] uppercase tracking-[0.3em]">
        Mali ya Agrey & Totoo | © 2024 - 2026
    </footer>

    <script>
        const SUPABASE_URL = 'https://rcfocaatkscgassogibs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjZm9jYWF0a3NjZ2Fzc29naWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjgzNDYsImV4cCI6MjA4ODM0NDM0Nn0.XgyTtSXBRQbbiQLuo4SThVVM6dM5uvUQUl-u_J889U4';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let localMediaData = []; 

        async function fetchMedia() {
            const { data, error } = await _supabase
                .from('vault_media')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error fetching data:', error);
                return;
            }

            localMediaData = data; 
            displayMedia(localMediaData);
        }

        function displayMedia(mediaList) {
            const grid = document.getElementById('media-grid');
            const loader = document.getElementById('gallery-loader');
            
            grid.innerHTML = ''; 

            if (mediaList.length === 0) {
                grid.innerHTML = '<p class="text-center text-gray-500 col-span-full py-10">Hakuna kilichopatikana...</p>';
            }

            mediaList.forEach(item => {
                const url = item.file_url;
                const type = item.file_type;
                const name = item.file_name;
                const caption = item.caption || ""; // Inasoma caption kutoka DB
                const ext = name.split('.').pop().toLowerCase();
                
                let htmlContent = '';

                if (type === 'image') {
                    htmlContent = `<img src="${url}" class="w-full h-auto block" loading="lazy">`;
                } else if (type === 'video') {
                    htmlContent = `<video controls class="w-full h-auto"><source src="${url}" type="video/${ext}"></video>`;
                } else if (type === 'audio') {
                    htmlContent = `
                        <div class="p-6 text-center">
                            <p class="text-[10px] mb-3 text-pink-400 font-bold uppercase tracking-widest">Voice Note 🎙️</p>
                            <audio controls class="rounded-lg"><source src="${url}" type="audio/${ext}"></audio>
                        </div>`;
                }

                // Kama kuna caption, ionyeshe chini ya picha/video
                let captionHtml = caption ? `<div class="caption-box">${caption}</div>` : '';

                if (htmlContent) {
                    const div = document.createElement('div');
                    div.className = 'media-item shadow-2xl flex flex-col';
                    div.innerHTML = htmlContent + captionHtml;
                    grid.appendChild(div);
                }
            });

            loader.classList.add('hidden');
            grid.classList.remove('hidden');
        }

        function filterMedia() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = localMediaData.filter(item => {
                const nameMatch = item.file_name.toLowerCase().includes(query);
                const captionMatch = (item.caption || "").toLowerCase().includes(query);
                return nameMatch || captionMatch;
            });

            displayMedia(filtered);
        }

        fetchMedia();
    </script>
</body>
</html>

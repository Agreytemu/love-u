<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totoo's Vault | Powered by Agrey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .special-font { font-family: 'Dancing Script', cursive; }
        
        /* GRID YA KISTAAILI - PICHA 2 KWENYE SIMU */
        .media-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            padding: 5px;
        }
        
        @media (min-width: 768px) { 
            .media-container { grid-template-columns: repeat(4, 1fr); gap: 15px; } 
        }

        .media-item {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 65, 108, 0.2);
            background: rgba(15, 15, 15, 0.6);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.1);
        }

        /* PICHA NDOGO NA ZA KISTAAILI */
        .media-item img, .media-item video {
            width: 100%;
            height: 130px; /* Saizi ndogo kistaili zaidi */
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 65, 108, 0.1);
        }

        /* CAPTION YA KIMAPENZI ZAIDI */
        .caption-box {
            padding: 10px 6px;
            background: linear-gradient(to bottom, transparent, rgba(255, 65, 108, 0.1));
            font-family: 'Dancing Script', cursive; /* Font ya mahaba */
            font-size: 15px; 
            color: #ff85a1;
            text-align: center;
            line-height: 1.2;
        }

        .media-item:hover {
            transform: translateY(-5px);
            border-color: #ff416c;
            box-shadow: 0 8px 25px rgba(255, 65, 108, 0.3);
        }

        /* SEARCH BAR YA KIMAPENZI */
        .search-input {
            background: rgba(255, 65, 108, 0.05);
            border: 1px solid rgba(255, 65, 108, 0.2);
            color: white;
            transition: 0.3s;
        }
        .search-input:focus {
            border-color: #ff416c;
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.2);
        }

        /* VOICE NOTE STYLE */
        .voice-card {
            height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 65, 108, 0.05);
        }
        audio { filter: invert(100%) hue-rotate(150deg) brightness(1.2); width: 90%; scale: 0.85; }

        .admin-nav {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 65, 108, 0.3);
        }
    </style>
</head>
<body class="p-3 md:p-10">

    <nav class="fixed top-0 left-0 w-full z-50 admin-nav px-6 py-3 flex justify-between items-center">
        <a href="love.html" class="special-font text-xl text-pink-400 hover:text-white">❤️ My Love</a>
        <a href="admin.html" class="bg-pink-600/20 border border-pink-500/50 text-pink-500 px-4 py-1 rounded-full text-[10px] font-bold tracking-tighter">
            ADMIN
        </a>
    </nav>

    <header class="text-center mb-8 pt-24">
        <h1 class="special-font text-6xl text-pink-500 mb-2 drop-shadow-lg">Maktaba ya Siri</h1>
        <p class="text-pink-300/60 uppercase tracking-[0.3em] text-[7px] font-bold">Kila Picha ina Tabasamu Lako ❤️</p>
        
        <div class="max-w-xs mx-auto mt-8">
            <input type="text" id="searchInput" onkeyup="filterMedia()" placeholder="Tafuta mahaba hapa..." 
                class="search-input w-full py-2 px-6 rounded-full text-xs outline-none text-center">
        </div>
    </header>

    <div id="gallery-loader" class="text-center py-20">
        <p class="special-font text-3xl text-pink-500 animate-pulse">Inafungua moyo...</p>
    </div>

    <div id="media-grid" class="media-container hidden"></div>

    <footer class="mt-20 text-center pb-10">
        <p class="text-pink-500 text-xl mb-2">❤️</p>
        <p class="text-gray-700 text-[8px] uppercase tracking-[0.4em]">Mali ya Agrey & Totoo | 2026</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://rcfocaatkscgassogibs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjZm9jYWF0a3NjZ2Fzc29naWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjgzNDYsImV4cCI6MjA4ODM0NDM0Nn0.XgyTtSXBRQbbiQLuo4SThVVM6dM5uvUQUl-u_J889U4';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let localMediaData = []; 

        async function fetchMedia() {
            const { data, error } = await _supabase
                .from('vault_media')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error:', error);
                return;
            }

            localMediaData = data; 
            displayMedia(localMediaData);
        }

        function displayMedia(mediaList) {
            const grid = document.getElementById('media-grid');
            const loader = document.getElementById('gallery-loader');
            
            grid.innerHTML = ''; 

            if (mediaList.length === 0) {
                grid.innerHTML = '<p class="text-center text-pink-900 col-span-full py-10 special-font text-xl">Bado sijaweka kumbukumbu hapa...</p>';
            }

            mediaList.forEach(item => {
                const url = item.file_url;
                const type = item.file_type;
                const caption = item.caption || "";
                
                let htmlContent = '';

                if (type === 'image') {
                    htmlContent = `<img src="${url}" loading="lazy" onclick="window.open('${url}', '_blank')">`;
                } else if (type === 'video') {
                    htmlContent = `<video controls><source src="${url}"></video>`;
                } else if (type === 'audio') {
                    htmlContent = `
                        <div class="voice-card">
                            <span class="text-[14px] mb-2">🎙️</span>
                            <audio controls><source src="${url}"></audio>
                        </div>`;
                }

                let captionHtml = caption ? `<div class="caption-box">${caption}</div>` : '';

                if (htmlContent) {
                    const div = document.createElement('div');
                    div.className = 'media-item';
                    div.innerHTML = htmlContent + captionHtml;
                    grid.appendChild(div);
                }
            });

            loader.classList.add('hidden');
            grid.classList.remove('hidden');
        }

        function filterMedia() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = localMediaData.filter(item => {
                return (item.file_name || "").toLowerCase().includes(query) || 
                       (item.caption || "").toLowerCase().includes(query);
            });
            displayMedia(filtered);
        }

        fetchMedia();
    </script>
</body>
</html>

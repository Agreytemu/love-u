<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totoo's Vault | Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #030303; color: white; font-family: 'Poppins', sans-serif; }
        .luxury-font { font-family: 'Playfair Display', serif; font-style: italic; }
        
        /* Masonry Grid Setup */
        #media-grid { 
            column-count: 2; column-gap: 15px; padding: 15px; display: none; 
            animation: fadeInUp 0.8s ease forwards;
        }
        @media (min-width: 768px) { #media-grid { column-count: 4; } }

        .media-card {
            break-inside: avoid; margin-bottom: 20px; border-radius: 15px;
            overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
        }
        .media-card img, .media-card video { width: 100%; display: block; }
        .caption-area { padding: 12px; text-align: center; font-size: 11px; color: #ffccd5; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .heart-loader { color: #ff416c; font-size: 40px; animation: pulse 1s infinite; text-align: center; margin-top: 100px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body class="pb-20">

    <nav class="p-6 flex justify-between items-center">
        <h2 class="luxury-font text-xl text-pink-500">Vault</h2>
        <a href="admin.html" class="text-[10px] border border-white/20 px-4 py-2 rounded-full hover:bg-white hover:text-black transition">ADMIN</a>
    </nav>

    <header class="text-center mt-10 mb-10">
        <h1 class="luxury-font text-5xl bg-clip-text text-transparent bg-gradient-to-r from-white to-pink-500">
            Maktaba ya Siri
        </h1>
        <p class="text-[9px] tracking-[5px] text-white/30 uppercase mt-4">Kila picha ina hadithi</p>
    </header>

    <div id="loader">
        <div class="heart-loader">❤️</div>
        <p class="text-center text-[10px] text-pink-300 mt-4 tracking-widest">INAFUNGUA MAKABIDHI...</p>
    </div>

    <div id="media-grid"></div>

    <script>
        // DATA ZAKO ZA SUPABASE
        const SUPABASE_URL = 'https://rcfocaatkscgassogibs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjZm9jYWF0a3NjZ2Fzc29naWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjgzNDYsImV4cCI6MjA4ODM0NDM0Nn0.XgyTtSXBRQbbiQLuo4SThVVM6dM5uvUQUl-u_J889U4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchVault() {
            const { data, error } = await supabase
                .from('vault_media')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Shida ya Table:", error.message);
                document.getElementById('loader').innerHTML = `<p class="text-red-500 text-center">Kosa: ${error.message}</p>`;
                return;
            }

            renderVault(data);
        }

        function renderVault(files) {
            const grid = document.getElementById('media-grid');
            const loader = document.getElementById('loader');
            grid.innerHTML = '';

            if (!files || files.length === 0) {
                loader.innerHTML = `<p class="text-gray-500 text-center uppercase tracking-widest text-xs mt-20">Vault ipo tupu bado...</p>`;
                return;
            }

            files.forEach(file => {
                const card = document.createElement('div');
                card.className = 'media-card';

                // Kutambua kama ni picha au video
                let mediaTag = '';
                const ext = file.file_name.split('.').pop().toLowerCase();

                if (file.file_type === 'image' || ['jpg', 'jpeg', 'png', 'webp', 'gif'].includes(ext)) {
                    mediaTag = `<img src="${file.file_url}" alt="Memory" loading="lazy">`;
                } else if (file.file_type === 'video' || ['mp4', 'mov', 'webm'].includes(ext)) {
                    mediaTag = `<video controls muted loop><source src="${file.file_url}" type="video/${ext}"></video>`;
                } else if (file.file_type === 'audio' || ['mp3', 'm4a', 'wav'].includes(ext)) {
                    mediaTag = `<div class="p-4 bg-pink-500/10 text-center"><p class="text-[8px] mb-2">VOICE NOTE</p><audio controls class="w-full h-8"><source src="${file.file_url}" type="audio/${ext}"></audio></div>`;
                }

                card.innerHTML = `
                    ${mediaTag}
                    <div class="caption-area">${file.caption || 'Memory'}</div>
                `;
                grid.appendChild(card);
            });

            loader.style.display = 'none';
            grid.style.display = 'block';
        }

        // Kuanzisha kazi mara tu page inapofunguka
        fetchVault();
    </script>
</body>
</html>

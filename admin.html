<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Admin | Cloud Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10">
    <div class="max-w-md mx-auto bg-zinc-900 p-8 rounded-3xl border border-white/10">
        <h2 class="text-2xl font-bold mb-6 text-pink-500">Pandisha Kumbukumbu</h2>
        
        <input type="file" id="fileInput" class="mb-4 block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-pink-600 file:text-white hover:file:bg-pink-700">
        
        <input type="text" id="captionInput" placeholder="Andika maelezo ya picha (Description)..." class="w-full p-3 rounded-xl bg-black border border-white/20 mb-6 text-sm outline-none focus:border-pink-500">
        
        <button onclick="uploadNow()" id="uploadBtn" class="w-full bg-pink-600 py-3 rounded-xl font-bold hover:bg-pink-700 transition">Rusha Hewani 🚀</button>
        
        <p id="status" class="mt-4 text-center text-xs text-gray-500"></p>
    </div>

    <script>
        // WEKA DATA ZAKO HAPA KAKA
        const CLOUD_NAME = 'DHALI_YAKO_HAPA'; // Jina lako la Cloudinary
        const UPLOAD_PRESET = 'PRESET_YAKO_HAPA'; // Ile preset ya 'Unsigned'

        async function uploadNow() {
            const file = document.getElementById('fileInput').files[0];
            const caption = document.getElementById('captionInput').value;
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');

            if (!file) return alert("Chagua picha kwanza!");

            btn.innerText = "Inatuma...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            formData.append('tags', 'vault'); // Tag muhimu ili Gallery izione
            formData.append('context', `caption=${caption}`); // Hapa ndipo maelezo yanakaa

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                if (data.secure_url) {
                    status.innerText = "SAFI! Imepanda.";
                    setTimeout(() => window.location.href = 'gallery.html', 1500);
                } else {
                    status.innerText = "Imefeli: " + data.error.message;
                }
            } catch (err) {
                status.innerText = "Kuna tatizo la internet!";
            } finally {
                btn.innerText = "Rusha Hewani 🚀";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totoo's Vault | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top, #1a0b16 0%, #050505 100%); 
            color: white; font-family: 'Poppins', sans-serif; min-height: 100vh;
        }
        .special-font { font-family: 'Dancing Script', cursive; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 65, 108, 0.2); 
            box-shadow: 0 0 30px rgba(255, 65, 108, 0.1);
        }
        .glow-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
            transition: 0.4s;
        }
        .glow-btn:hover { transform: scale(1.02); box-shadow: 0 0 25px rgba(255, 65, 108, 0.6); }
        .input-style {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .input-style:focus { border-color: #ff416c; box-shadow: 0 0 10px rgba(255, 65, 108, 0.2); outline: none; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass-card w-full max-w-md p-10 rounded-[40px] text-center">
        <h1 class="special-font text-5xl text-pink-500 mb-2">Hifadhi Hisia ❤️</h1>
        <p class="text-[10px] tracking-[0.4em] text-white/40 uppercase mb-10 font-light">Cloudinary Secure Vault</p>

        <div class="mb-6 relative group">
            <label for="fileInput" class="cursor-pointer block p-8 border-2 border-dashed border-white/10 rounded-3xl hover:border-pink-500/50 transition bg-black/20">
                <div id="preview-text">
                    <span class="text-3xl">📸</span>
                    <p class="text-xs mt-2 text-gray-400">Gusa hapa kuchagua picha au video</p>
                </div>
                <img id="image-preview" class="hidden w-full h-40 object-cover rounded-2xl mx-auto shadow-2xl">
            </label>
            <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="previewFile()">
        </div>

        <div class="text-left mb-8">
            <label class="text-[10px] uppercase tracking-widest text-pink-400 mb-2 block ml-2">Neno la Siri (Description)</label>
            <textarea id="captionInput" rows="2" placeholder="Andika kitu kizuri kuhusu hii..." 
                class="input-style w-full p-4 rounded-2xl text-sm text-white resize-none"></textarea>
        </div>

        <button onclick="uploadToCloud()" id="uploadBtn" class="glow-btn w-full py-4 rounded-2xl font-bold text-sm tracking-widest">
            RUSHA KWENYE VAULT 🚀
        </button>

        <p id="status" class="mt-6 text-[10px] text-white/30 italic"></p>
    </div>

    <script>
        // DATA ZAKO ULIZONIPA
        const CLOUD_NAME = 'dutntrdi3'; 
        const UPLOAD_PRESET = 'my_vault'; 

        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            const preview = document.getElementById('image-preview');
            const previewText = document.getElementById('preview-text');
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    previewText.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        async function uploadToCloud() {
            const file = document.getElementById('fileInput').files[0];
            const caption = document.getElementById('captionInput').value;
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');

            if (!file) return alert("Kaka, chagua picha ya Totoo kwanza!");

            btn.innerText = "INATUMA KWENYE MAWIMBI...";
            btn.disabled = true;
            status.innerText = "Inahifadhi kumbukumbu yako milele...";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            formData.append('tags', 'vault'); // Muhimu kwa ajili ya Gallery
            formData.append('context', `caption=${caption}`); // Hapa ndipo Description inakaa

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                
                if (data.secure_url) {
                    status.innerText = "SAFI! Imeingia kwenye Vault.";
                    setTimeout(() => {
                        window.location.href = 'gallery.html';
                    }, 1500);
                } else {
                    status.innerText = "Kuna tatizo: " + data.error.message;
                    btn.disabled = false;
                    btn.innerText = "JARIBU TENA 🔄";
                }
            } catch (err) {
                status.innerText = "Internet imekata kidogo!";
                btn.disabled = false;
                btn.innerText = "JARIBU TENA 🔄";
            }
        }
    </script>
</body>
</html>

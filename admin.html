<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrey Admin Pro | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <h1 class="text-2xl font-bold text-pink-500 tracking-tighter">AGREY COMMAND CENTER</h1>
            <a href="gallery.html" class="text-xs bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition">RUDI GALLERY</a>
        </header>

        <div class="glass-card p-8 mb-10">
            <h2 class="text-lg font-semibold mb-4">Pandisha Picha, Video au Sauti</h2>
            <div class="flex flex-col gap-4">
                <input type="file" id="fileInput" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-pink-600 file:text-white hover:file:bg-pink-700 cursor-pointer bg-white/5 p-4 rounded-xl">
                <button onclick="handleUpload()" id="uploadBtn" class="w-full bg-pink-600 hover:bg-pink-700 py-4 rounded-xl font-bold shadow-lg shadow-pink-500/30 transition-all">PANDISHA KWENYE VAULT</button>
            </div>
            <div id="status" class="mt-4 text-center text-sm font-medium hidden"></div>
        </div>

        <div class="flex gap-4 mb-6">
            <input type="text" id="searchBox" onkeyup="loadMedia()" placeholder="Tafuta jina..." class="bg-white/5 border border-white/10 px-4 py-2 rounded-lg flex-1 outline-none focus:border-pink-500">
            <select id="typeFilter" onchange="loadMedia()" class="bg-white/5 border border-white/10 px-4 py-2 rounded-lg outline-none">
                <option value="all">Vyote</option>
                <option value="image">Picha</option>
                <option value="video">Video</option>
                <option value="audio">Voice</option>
            </select>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-white/5 text-gray-400">
                    <tr><th class="p-4">Faili</th><th class="p-4 text-right">Action</th></tr>
                </thead>
                <tbody id="mediaList"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rcfocaatkscgassogibs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjZm9jYWF0a3NjZ2Fzc29naWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjgzNDYsImV4cCI6MjA4ODM0NDM0Nn0.XgyTtSXBRQbbiQLuo4SThVVM6dM5uvUQUl-u_J889U4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleUpload() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');

            if (!fileInput.files[0]) return alert("Chagua faili kwanza!");

            const file = fileInput.files[0];
            const fileName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
            const fileType = file.type.split('/')[0]; // image, video, au audio

            btn.disabled = true;
            btn.innerText = "Inatuma...";
            status.className = "mt-4 text-center text-sm text-yellow-500 block";
            status.innerText = "Inapakia kwenye Cloud...";

            // 1. UPLOAD KWENYE STORAGE
            const { data: sData, error: sError } = await supabase.storage.from('media').upload(fileName, file);
            if (sError) {
                btn.disabled = false;
                status.innerText = "Error Storage: " + sError.message;
                return;
            }

            // 2. PATA URL
            const { data: urlData } = supabase.storage.from('media').getPublicUrl(fileName);
            const publicUrl = urlData.publicUrl;

            // 3. INSERT KWENYE TABLE (Gallery inasoma hapa)
            const { error: dbError } = await supabase.from('vault_media').insert([{
                file_name: fileName,
                file_url: publicUrl,
                file_type: fileType
            }]);

            if (dbError) {
                status.innerText = "Error Database: " + dbError.message;
            } else {
                status.className = "mt-4 text-center text-sm text-green-500 block";
                status.innerText = "SUCCESS! Vitu vimepanda na Gallery imesasishwa.";
                fileInput.value = '';
                loadMedia();
            }
            btn.disabled = false;
            btn.innerText = "PANDISHA KWENYE VAULT";
        }

        async function loadMedia() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;
            const list = document.getElementById('mediaList');

            let query = supabase.from('vault_media').select('*').order('created_at', { ascending: false });
            if (type !== 'all') query = query.eq('file_type', type);

            const { data, error } = await query;
            if (error) return;

            list.innerHTML = '';
            data.filter(f => f.file_name.toLowerCase().includes(search)).forEach(item => {
                list.innerHTML += `
                    <tr class="border-t border-white/5">
                        <td class="p-4 flex items-center gap-3">
                            <div class="w-10 h-10 bg-white/10 rounded overflow-hidden">
                                ${item.file_type === 'image' ? `<img src="${item.file_url}" class="w-full h-full object-cover">` : `<div class="flex items-center justify-center h-full text-[10px]">${item.file_type.toUpperCase()}</div>`}
                            </div>
                            <span class="text-xs text-gray-400">${item.file_name.substring(0,15)}...</span>
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="deleteMedia('${item.id}', '${item.file_name}')" class="text-red-500 font-bold text-xs">FUTA</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function deleteMedia(id, fileName) {
            if(!confirm("Futa kabisa?")) return;
            await supabase.storage.from('media').remove([fileName]);
            await supabase.from('vault_media').delete().eq('id', id);
            loadMedia();
        }

        loadMedia();
    </script>
</body>
</html>
